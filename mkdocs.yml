site_name: Timberbot API
site_description: Full read/write HTTP API for controlling Timberborn with AI
site_url: https://abix-.github.io/TimberbornMods/
repo_url: https://github.com/abix-/TimberbornMods
repo_name: abix-/TimberbornMods
edit_uri: edit/master/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abix-/TimberbornMods
    - icon: fontawesome/brands/steam
      link: https://steamcommunity.com/sharedfiles/filedetails/?id=3689670088

nav:
  - Getting Started: getting-started.md
  - API Reference: api-reference.md
  - Timberbot AI: timberbot.md
  - Features: features.md
  - Webhooks: webhooks.md
  - Architecture: architecture.md
  - Performance: performance.md
  - Developing: developing.md

copyright: Timberbot API &mdash; Play Timberborn with an AI

